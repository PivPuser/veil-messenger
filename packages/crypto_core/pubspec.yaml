name: crypto_core
description: >-
  End-to-end encryption core (X3DH key agreement + Double Ratchet) for the
  anonymous messenger. Pure Dart, no Flutter dependency, so it can be unit
  tested in isolation with `dart test`.
publish_to: none
version: 0.1.0

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  # Vetted, well-maintained crypto library. We NEVER implement primitives by
  # hand — this package provides X25519, Ed25519, HKDF, HMAC-SHA256 and
  # ChaCha20-Poly1305.
  cryptography: ^2.7.0

dev_dependencies:
  test: ^1.25.0
  lints: ^4.0.0
